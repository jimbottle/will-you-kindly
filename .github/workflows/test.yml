name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pin to go.mod so this CI always uses the project's declared
          # toolchain instead of drifting to whatever setup-go defaults to.
          go-version-file: go.mod
          check-latest: true

      - name: Module download
        run: go mod download

      - name: gofmt
        # Capture `gofmt -l .` output (the list of non-conforming
        # files) and fail when it's non-empty. Previous rounds
        # accumulated drift across 9 files; pinning this in CI
        # keeps the tree clean without relying on local pre-commit
        # hooks. The error message names the fix so a contributor
        # who hits this can resolve it in one command.
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found non-conforming files:"
            echo "$out"
            echo "Run \`gofmt -w .\` to fix."
            exit 1
          fi

      - name: docs-snapshot drift check
        # Builds wyk, regenerates docs/generated/{keymap.md,cli.md}, and
        # fails if the diff isn't clean. A code change touching a flag
        # surface or keymap entry must bring the matching docs snapshot
        # along — the would-you-kindly.raylytics.io docs agent reads
        # those files directly, so drift here would silently feed it
        # stale data. Same pattern as the gofmt check above; named
        # `make docs-check` so the same check runs identically on a
        # contributor's machine.
        run: |
          if ! make docs-check; then
            echo "::error::docs/generated/ is stale — run \`make docs-snapshot\` and commit the result"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        # Runs the linter set declared in .golangci.yml: govet,
        # staticcheck, errcheck, ineffassign, unused. Pinned to a
        # specific version so a CI flake from a new linter release
        # is impossible — bump deliberately when a new check would
        # be valuable. action@v7 pairs with golangci-lint v2.x;
        # the older v6 ran a v1-era binary by default.
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Build
        run: go build ./...

      - name: Test (with race detector)
        # -race catches concurrency bugs the unit tests would otherwise
        # silently leak past — load-bearing for MultiBDSource's
        # parallel-fetch path.
        run: go test -race -timeout 5m ./...
