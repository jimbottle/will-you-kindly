name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pin to go.mod so this CI always uses the project's declared
          # toolchain instead of drifting to whatever setup-go defaults to.
          go-version-file: go.mod
          check-latest: true

      - name: Module download
        run: go mod download

      - name: gofmt
        # `gofmt -l` prints any non-conforming file and exits 0; the
        # `! -s` flag inversion fails the step when output is
        # non-empty so unformatted code can't reland. Previous rounds
        # accumulated drift across 9 files; pinning this in CI keeps
        # the tree clean without relying on local pre-commit hooks.
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found non-conforming files:"
            echo "$out"
            echo "Run \`gofmt -w .\` to fix."
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (with race detector)
        # -race catches concurrency bugs the unit tests would otherwise
        # silently leak past — load-bearing for MultiBDSource's
        # parallel-fetch path.
        run: go test -race -timeout 5m ./...
